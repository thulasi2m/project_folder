<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Report</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div class="brand">
        <svg class="logo" width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="3" width="20" height="18" rx="3" fill="#1fa64a"></rect>
          <path d="M7 9h10v6H7z" fill="#fff"></path>
        </svg>
        <div class="title">Report</div>
      </div>

      <div class="actions">
        <button class="btn excel">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden><rect x="3" y="4" width="18" height="16" rx="2" fill="#fff"/></svg>
          Export Excel
        </button>
        <button class="btn pdf">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden><rect x="3" y="4" width="18" height="16" rx="2" fill="#fff"/></svg>
          Export PDF
        </button>
        <button id="analyzeBtn" class="btn analyze">Analyze</button>
        <button class="btn danger">Delete</button>
        <button class="btn refresh">Refresh</button>
      </div>
    </header>

    <section class="filters" aria-label="Filters">
      <div class="filter-grid">
        <div class="filter-card">
          <label class="lbl">Date Time (From)</label>
          <div class="control date-control">
            <svg class="icon" viewBox="0 0 24 24" width="16" height="16"><path fill="#1fa64a" d="M7 10h6v2H7z"></path></svg>
            <input type="date" value="2020-01-01">
            <div class="time-boxes">
              <input type="number" min="0" max="23" value="00">
              <span>:</span>
              <input type="number" min="0" max="59" value="00">
              <span>:</span>
              <input type="number" min="0" max="59" value="00">
            </div>
          </div>
        </div>

        <div class="filter-card">
          <label class="lbl">Item</label>
          <div class="control"><select><option>All</option></select></div>
        </div>

        <div class="filter-card">
          <label class="lbl">AirGauge ID</label>
          <div class="control"><select><option>All</option></select></div>
        </div>

        <div class="filter-card">
          <label class="lbl">Drawing</label>
          <div class="control"><select><option>All</option></select></div>
        </div>

        <div class="filter-card">
          <label class="lbl">Date Time (To)</label>
          <div class="control date-control">
            <svg class="icon" viewBox="0 0 24 24" width="16" height="16"><path fill="#1fa64a" d="M7 10h6v2H7z"></path></svg>
            <input type="date" value="2026-12-06">
            <div class="time-boxes">
              <input type="number" min="0" max="23" value="23">
              <span>:</span>
              <input type="number" min="0" max="59" value="59">
              <span>:</span>
              <input type="number" min="0" max="59" value="59">
            </div>
          </div>
        </div>

        <div class="filter-card">
          <label class="lbl">Operator</label>
          <div class="control"><select><option>All</option></select></div>
        </div>

        <div class="filter-card">
          <label class="lbl">Machine ID</label>
          <div class="control"><select><option>All</option></select></div>
        </div>

        <div class="filter-card">
          <label class="lbl">Customer</label>
          <div class="control"><select><option>All</option></select></div>
        </div>
      </div>
    </section>

    <main class="table-area">
      <div class="table-header">
        <div class="cols"># • Time • Date • Reading • Offset • Status • AirGauge ID • Channel • Drawing • User</div>
      </div>

      <div class="empty-state">
        <svg class="empty-icon" viewBox="0 0 64 64" width="120" height="120" aria-hidden>
          <rect x="6" y="20" width="52" height="28" rx="3" fill="#f4faf5"></rect>
          <path d="M14 20l6-6h24l6 6" fill="#e6f4ea"></path>
          <rect x="20" y="30" width="24" height="4" rx="1" fill="#cde9cf"></rect>
        </svg>
        <h3>No data available</h3>
        <p>Please select filters and click Analyze to view data.</p>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
